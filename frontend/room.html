<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Room Directory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { font-family: Arial, sans-serif; background-color: #faf9f0; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 30px; background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #28a745; color: white; }
    tr:hover { background-color: #f1f1f1; }
    .container { max-width: 1000px; margin: auto; }
    .modal-header { background: linear-gradient(45deg, #28a745, #218838); color: white; }
    .modal-header .btn-close { filter: brightness(0) invert(1); }
    #addRoomForm input.form-control, #addRoomForm select.form-control { border: 2px solid #28a745; border-radius: 0.4rem; }
    #addRoomForm label.form-label { font-weight: 600; color: #155724; }
    .modal-footer .btn-primary { background-color: #28a745; border-color: #28a745; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Room Directory</h1>
    <a href="index.html" class="btn btn-secondary mt-2">🏠 Home</a>
    <button class="btn btn-success mt-2" data-bs-toggle="modal" data-bs-target="#addRoomModal">Add New Room</button>
    <table id="roomtable" class="table table-striped">
      <thead>
        <tr><th>Room ID</th><th>Room Number</th><th>Type</th><th>Price</th><th>Status</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="modal fade" id="addRoomModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <form id="addRoomForm" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Room</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Room Number</label><input type="text" class="form-control" id="room_number" required /></div>
          <div class="mb-3"><label class="form-label">Type</label><input type="text" class="form-control" id="type" required /></div>
          <div class="mb-3"><label class="form-label">Price</label><input type="number" class="form-control" id="price" required /></div>
          <div class="mb-3"><label class="form-label">Status</label>
            <select class="form-control" id="status">
              <option value="Available">Available</option>
              <option value="Occupied">Occupied</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Room</button>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="Script/room.js"></script>
</body>
</html>
