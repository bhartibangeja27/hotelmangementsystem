<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            color: white;
        }
        .header {
            text-align: center;
            padding: 50px 20px 30px;
        }
        .header h1 {
            font-size: 2.8rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 30px 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .nav a {
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 25px 35px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            min-width: 150px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .nav a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }
        .nav a .icon {
            display: block;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .content {
            text-align: center;
            padding: 40px;
        }
        .content h2 {
            font-size: 1.5rem;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏨 Hotel Management System</h1>
        <p>Welcome to Hotel Management System</p>
    </div>
    <div class="nav">
        <a href="customer.html"><span class="icon">👤</span>Customers</a>
        <a href="room.html"><span class="icon">🛏️</span>Rooms</a>
        <a href="booking.html"><span class="icon">📅</span>Bookings</a>
        <a href="payment.html"><span class="icon">💳</span>Payments</a>
        <a href="employee.html"><span class="icon">👨‍💼</span>Employees</a>
        <a href="feedback.html"><span class="icon">⭐</span>Feedback</a>
    </div>
    <div class="content">
        <h2>Select a section from above</h2>
    </div>
</body>
</html>
